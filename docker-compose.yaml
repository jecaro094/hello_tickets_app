version: "3.9"

services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright_scraper
    volumes:
      - ./src:/app/src
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "5678:5678"   # debugger port
    command: >
      python -m debugpy
      --listen 0.0.0.0:5678
      --wait-for-client
      -m src.main
    network_mode: bridge
    shm_size: "2gb"
